version: '3.8'

services:
  mongo:
    image: mongo:6
    container_name: investment-tracker-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password

  backend:
    build: .
    container_name: investment-tracker-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:password@mongo:27017/investment-tracker?authSource=admin
      JWT_SECRET: your-super-secret-key
      PORT: 5000
      NODE_ENV: production
    depends_on:
      - mongo
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mongo_data: